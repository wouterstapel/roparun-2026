function pad(n) { return String(n).padStart(2, "0"); }

function formatDuur(ms) {
  if (ms <= 0) return "—";
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return h + "u " + pad(m) + "m";
}

function calcEtaMs(vanKm, naarKm, snelheid) {
  if (!snelheid || snelheid <= 0 || naarKm <= vanKm) return null;
  return Date.now() + ((naarKm - vanKm) / snelheid) * 3600000;
}

function formatEta(ms) {
  if (!ms) return null;
  const d = new Date(ms);
  const dagen = ["zo","ma","di","wo","do","vr","za"];
  return dagen[d.getDay()] + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
}

// ── KAART ─────────────────────────────────────────────────────────────────────
function RouteKaart({ huidigKm, snelheid, gpsData }) {
  const mapRef = useRef(null);
  const kaartRef = useRef(null);
  const gereenRef = useRef(null);
  const markerRef = useRef(null);
  const animKmRef = useRef(0);
  const animTimerRef = useRef(null);

  useEffect(function() {
    if (kaartRef.current || !mapRef.current) return;
    const map = L.map(mapRef.current, { zoomControl: true }).setView([50.5, 4.0], 6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "© OpenStreetMap" }).addTo(map);
    L.polyline(GPX_ROUTE, { color: "#3b82f6", weight: 3, opacity: 0.7 }).addTo(map);
    KAART_PUNTEN.forEach(function(p) {
      const kleuren = { start: "#f59e0b", wp: "#4ade80", finish: "#3b82f6", cp: "#fde047", door: "#93c5fd" };
      const kleur = kleuren[p.type] || "#94a3b8";
      const groot = ["wp","start","finish"].includes(p.type);
      const med = p.type === "cp";
      const s = groot ? 14 : med ? 10 : 6;
      const icon = L.divIcon({
        className: "",
        html: "<div style='width:" + s + "px;height:" + s + "px;background:" + kleur + ";border-radius:50%;border:2px solid rgba(255,255,255,0.8);box-shadow:0 1px 4px rgba(0,0,0,0.5)'></div>",
        iconSize: [s, s], iconAnchor: [s/2, s/2]
      });
      L.marker([p.lat, p.lon], { icon: icon }).addTo(map).bindPopup("<b>" + p.naam + "</b>");
    });
    kaartRef.current = map;
  }, []);

  function kmNaarCoord(km) {
    const idx = Math.min(Math.round((km / TOTAL_KM) * GPX_ROUTE.length), GPX_ROUTE.length - 1);
    return GPX_ROUTE[Math.max(0, idx)];
  }

  function updateKaart(km) {
    if (!kaartRef.current) return;
    const map = kaartRef.current;
    if (gereenRef.current) { map.removeLayer(gereenRef.current); gereenRef.current = null; }
    if (km > 0) {
      const n = Math.min(Math.round((km / TOTAL_KM) * GPX_ROUTE.length) + 1, GPX_ROUTE.length);
      const gereden = GPX_ROUTE.slice(0, n);
      if (gereden.length > 1) {
        gereenRef.current = L.polyline(gereden, { color: "#4ade80", weight: 4, opacity: 0.9 }).addTo(map);
      }
    }
    if (markerRef.current) { map.removeLayer(markerRef.current); markerRef.current = null; }
    if (km > 0) {
      const isExactGPS = gpsData && gpsData.lat;
      const pos = isExactGPS ? [parseFloat(gpsData.lat), parseFloat(gpsData.lon)] : kmNaarCoord(km);
      if (pos) {
        const icon = L.divIcon({
          className: "",
          html: "<div style='width:18px;height:18px;background:" + (isExactGPS ? "#e65100" : "#f59e0b") + ";border-radius:50%;border:3px solid white;box-shadow:0 0 0 5px rgba(230,81,0,0.35)'></div>",
          iconSize: [18, 18], iconAnchor: [9, 9]
        });
        markerRef.current = L.marker(pos, { icon: icon }).addTo(map).bindPopup("<b>" + (isExactGPS ? "GPS positie" : "Geschatte positie") + " · " + km.toFixed(1) + " km</b>");
      }
    }
  }

  useEffect(function() {
    if (animTimerRef.current) { clearInterval(animTimerRef.current); animTimerRef.current = null; }
    if (huidigKm <= 0) return;
    animKmRef.current = huidigKm;
    updateKaart(huidigKm);
    const pos = kmNaarCoord(huidigKm);
    if (pos && kaartRef.current) kaartRef.current.setView(pos, 12);
    const stapKm = (snelheid || 11) / 360;
    animTimerRef.current = setInterval(function() {
      animKmRef.current = Math.min(animKmRef.current + stapKm, TOTAL_KM);
      updateKaart(animKmRef.current);
    }, 10000);
    return function() { if (animTimerRef.current) clearInterval(animTimerRef.current); };
  }, [huidigKm, snelheid, gpsData]);

  return (
    <div style={{ margin: "12px 16px 0", borderRadius: 14, overflow: "hidden", border: "1px solid rgba(255,255,255,0.1)" }}>
      <div style={{ background: "#1a2530", padding: "8px 14px", fontSize: 11, color: "rgba(255,255,255,0.5)", display: "flex", gap: 12, alignItems: "center" }}>
        <span>Route kaart · exacte GPX route</span>
        <span style={{ marginLeft: "auto", display: "flex", gap: 10, alignItems: "center" }}>
          <span style={{ display: "flex", gap: 4, alignItems: "center" }}><span style={{ width: 12, height: 3, background: "#3b82f6", display: "inline-block", borderRadius: 2 }}></span><span>Route</span></span>
          <span style={{ display: "flex", gap: 4, alignItems: "center" }}><span style={{ width: 12, height: 3, background: "#4ade80", display: "inline-block", borderRadius: 2 }}></span><span>Gereden</span></span>
        </span>
      </div>
      <div ref={mapRef} style={{ height: 300, width: "100%" }} />
    </div>
  );
}

function PinScherm({ onSuccess }) {
  const [pin, setPin] = useState("");
  const [fout, setFout] = useState(false);

  function druk(k) {
    if (k === "X") { setPin(function(p) { return p.slice(0,-1); }); setFout(false); return; }
    const nieuw = pin + k;
    setPin(nieuw);
    if (nieuw.length === 4) {
      if (nieuw === TEAM_PIN) { onSuccess(); }
      else { setFout(true); setTimeout(function() { setPin(""); setFout(false); }, 600); }
    }
  }

  return (
    <div style={{ fontFamily: "-apple-system,sans-serif", background: "#0f1923", minHeight: "100vh", color: "white", maxWidth: 430, margin: "0 auto", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32 }}>
      <div style={{ fontSize: 32, marginBottom: 8 }}>🔒</div>
      <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Team App</div>
      <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", marginBottom: 40 }}>Voer de pincode in</div>
      <div style={{ display: "flex", gap: 16, marginBottom: 40 }}>
        {[0,1,2,3].map(function(i) {
          return <div key={i} style={{ width: 18, height: 18, borderRadius: "50%", background: fout ? "#ef4444" : pin.length > i ? "#4ade80" : "rgba(255,255,255,0.15)", transition: "background 0.15s" }} />;
        })}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, width: "100%", maxWidth: 280 }}>
        {["1","2","3","4","5","6","7","8","9","","0","X"].map(function(k, i) {
          if (k === "") return <div key={i} />;
          return (
            <button key={i} onClick={function() { druk(k); }} style={{ padding: "18px 0", fontSize: k === "X" ? 20 : 22, fontWeight: 600, borderRadius: 14, border: "none", background: k === "X" ? "#1a2530" : "#1e3a2e", color: "white", cursor: "pointer", fontFamily: "inherit" }}>
              {k === "X" ? "⌫" : k}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function TeamApp({ onSwitch }) {
  const [ingelogd, setIngelogd] = useState(false);
  const [sel, setSel] = useState(null);
  const [log, setLog] = useState([]);
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState("");
  const [filter, setFilter] = useState("wp");
  const [zoek, setZoek] = useState("");
  const [tracking, setTracking] = useState("UIT");
  const [trackingLoading, setTrackingLoading] = useState(false);
  const [liveData, setLiveData] = useState(null);
  const [nu, setNu] = useState(Date.now());

  // Klok - elke seconde
  useEffect(function() {
    const t = setInterval(function() { setNu(Date.now()); }, 1000);
    return function() { clearInterval(t); };
  }, []);

  // Live data ophalen
  useEffect(function() {
    function fetchLive() {
      fetch(SCRIPT_URL + "?type=checkpoints")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          setLiveData(data);
          if (data.tracking) setTracking(data.tracking);
        }).catch(function() {});
    }
    fetchLive();
    const t = setInterval(fetchLive, 30000);
    return function() { clearInterval(t); };
  }, []);

  function nowStr() { return new Date().toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit", second: "2-digit" }); }
  function addLog(msg, t) { setLog(function(p) { return [{ msg: msg, t: t, time: nowStr() }, ...p].slice(0, 10); }); }
  function showToast(msg) { setToast(msg); setTimeout(function() { setToast(""); }, 3000); }

  function toggleTracking(aan) {
    setTrackingLoading(true);
    fetch(SCRIPT_URL + "?type=" + (aan ? "tracking_aan" : "tracking_uit"))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        setTracking(data.tracking);
        showToast(aan ? "✓ GPS tracking gestart!" : "⏹ GPS tracking gestopt");
        setTrackingLoading(false);
      })
      .catch(function() { showToast("Mislukt — probeer opnieuw"); setTrackingLoading(false); });
  }

  function bevestig() {
    if (!sel) { showToast("Kies eerst een punt"); return; }
    setLoading(true);
    const url = SCRIPT_URL + "?type=checkpoint&team=HW-Runners&checkpoint=" + encodeURIComponent(sel.naam) + "&km=" + sel.km + "&timestamp=" + encodeURIComponent(new Date().toISOString());
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function() { addLog("✓ " + sel.naam + " (" + sel.km + " km)", "ok"); showToast("✓ Gelogd!"); setLoading(false); setSel(null); })
      .catch(function() { addLog("Versturen mislukt", "err"); setLoading(false); });
  }

  // Bereken afteller rustend team
  const rustInfo = (function() {
    const leeg = { volgendWP: WISSELPUNTEN[1], etaMs: null, restMs: null, snelheid: DEFAULT_SPEED, lopendTeam: "A" };
    if (!liveData || !liveData.checkpoints || liveData.checkpoints.length <= 1) return leeg;
    const cps = liveData.checkpoints.slice(1)
      .map(function(r) { return { timestamp: r[0], naam: r[2], km: parseFloat(r[3]) || 0 }; })
      .sort(function(a,b) { return a.km - b.km; });
    if (cps.length === 0) return leeg;

    const huidigKm = Math.max.apply(null, cps.map(function(c) { return c.km; }));
    const gpsKm = (liveData.gps && liveData.gps.km) ? parseFloat(liveData.gps.km) : 0;
    const effectiefKm = Math.max(huidigKm, gpsKm);

    // Bepaal lopend team op basis van laatste wisselpunt
    const laatste = cps[cps.length-1];
    const huidigWP = WISSELPUNTEN.reduce(function(best, wp) {
      return Math.abs(wp.km - laatste.km) < Math.abs(best.km - laatste.km) ? wp : best;
    }, WISSELPUNTEN[0]);
    const lopendTeam = (huidigWP && huidigWP.team && huidigWP.team.includes("A→B")) ? "B" : "A";

    // Volgend wisselpunt
    const volgendWP = WISSELPUNTEN.find(function(p) { return p.km > effectiefKm; });
    if (!volgendWP) return leeg;

    // Realtime snelheid huidige shift
    const shiftStart = cps[cps.length-1];
    const dKm = effectiefKm - shiftStart.km;
    const dtMs = nu - new Date(shiftStart.timestamp).getTime();
    const snelheid = (dKm > 0.3 && dtMs > 60000) ? dKm / (dtMs / 3600000) : DEFAULT_SPEED;

    const restKm = volgendWP.km - effectiefKm;
    const restMs = snelheid > 0 ? (restKm / snelheid) * 3600000 : null;
    const etaMs = restMs ? nu + restMs : null;

    return { volgendWP: volgendWP, etaMs: etaMs, restMs: restMs, snelheid: snelheid, lopendTeam: lopendTeam };
  })();

  function formatAfteller(ms) {
    if (!ms || ms <= 0) return "00:00:00";
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return pad(h) + ":" + pad(m) + ":" + pad(s);
  }

  const toonTypes = {
    wp: ["start","wp","finish"],
    cp: ["start","wp","finish","cp"],
    rbr: ["start","wp","finish","rbr"],
    alles: ["start","wp","finish","cp","rbr","door","toilet"],
  };

  const zichtbaar = ROUTE.filter(function(p) {
    if (!toonTypes[filter] || !toonTypes[filter].includes(p.type)) return false;
    if (zoek && !p.naam.toLowerCase().includes(zoek.toLowerCase())) return false;
    return true;
  });

  if (!ingelogd) return <PinScherm onSuccess={function() { setIngelogd(true); }} />;

  return (
    <div style={{ fontFamily: "-apple-system,sans-serif", background: "#0f1923", minHeight: "100vh", color: "white", maxWidth: 430, margin: "0 auto", paddingBottom: 40 }}>

      {/* Header */}
      <div style={{ background: "linear-gradient(135deg,#1a3a2a,#0f2a1a)", padding: "44px 20px 16px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 11, color: "#4ade80", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>HW-Runners · Roparun 2026</div>
            <div style={{ fontSize: 22, fontWeight: 700 }}>Team App</div>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", marginTop: 2 }}>Geef door bij welk punt je bent</div>
          </div>
          <button onClick={function() { setIngelogd(false); }} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 99, padding: "6px 12px", color: "rgba(255,255,255,0.4)", fontSize: 12, cursor: "pointer" }}>🔒 Slot</button>
        </div>

        {/* GPS Tracking toggle */}
        <div style={{ padding: "12px 14px", background: tracking === "AAN" ? "rgba(74,222,128,0.1)" : "rgba(255,255,255,0.05)", borderRadius: 12, border: "1px solid " + (tracking === "AAN" ? "rgba(74,222,128,0.3)" : "rgba(255,255,255,0.1)"), display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 10, height: 10, borderRadius: "50%", background: tracking === "AAN" ? "#4ade80" : "#6b7280", flexShrink: 0, animation: tracking === "AAN" ? "pulse 2s infinite" : "none" }} />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: tracking === "AAN" ? "#4ade80" : "rgba(255,255,255,0.5)" }}>
              {tracking === "AAN" ? "🛰️ GPS Tracking actief" : "⏸ GPS Tracking gestopt"}
            </div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginTop: 2 }}>
              {tracking === "AAN" ? "Elke 5 min GPS van Traccar" : "Traccar GPS wordt niet opgehaald"}
            </div>
          </div>
          {tracking !== "AAN" ? (
            <button onClick={function() { toggleTracking(true); }} disabled={trackingLoading} style={{ padding: "8px 14px", borderRadius: 99, border: "none", background: trackingLoading ? "#1a2530" : "#16a34a", color: "white", fontSize: 12, fontWeight: 700, cursor: "pointer", flexShrink: 0 }}>
              {trackingLoading ? "…" : "▶ Start"}
            </button>
          ) : (
            <button onClick={function() { toggleTracking(false); }} disabled={trackingLoading} style={{ padding: "8px 14px", borderRadius: 99, border: "none", background: trackingLoading ? "#1a2530" : "#dc2626", color: "white", fontSize: 12, fontWeight: 700, cursor: "pointer", flexShrink: 0 }}>

      <div style={{ padding: "14px 16px 0" }}>

        {/* Filter tabs */}
        <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
          {[["alles","Alles"],["wp","Wisselpunten"],["cp","+ Checkpoints"],["rbr","+ RBR"]].map(function(item) {
            return (
              <button key={item[0]} onClick={function() { setFilter(item[0]); }} style={{ padding: "5px 12px", borderRadius: 99, border: "none", fontSize: 12, fontWeight: 500, cursor: "pointer", background: filter === item[0] ? "#4ade80" : "#1a2530", color: filter === item[0] ? "#0a2e14" : "rgba(255,255,255,0.6)" }}>{item[1]}</button>

        {/* Zoek */}
        <input value={zoek} onChange={function(e) { setZoek(e.target.value); }} placeholder="Zoek plaats of punt…" style={{ width: "100%", padding: "9px 14px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "#1a2530", color: "white", fontSize: 14, outline: "none", fontFamily: "inherit", marginBottom: 10 }} />

        {/* Route lijst */}
        <div style={{ background: "#1a2530", borderRadius: 14, overflow: "hidden", marginBottom: 14, maxHeight: 380, overflowY: "auto" }}>
          {zichtbaar.map(function(p, i) {

            {log.map(function(l, i) {
              return (

                </div>
              );
            })}
          </div>
        )}

        {/* Afteller rustend team */}
        <div style={{ background: "linear-gradient(135deg,#1e3a2e,#1a2530)", borderRadius: 14, padding: "16px", marginBottom: 14, border: "1px solid " + (rustInfo.restMs && rustInfo.restMs < 1800000 ? "rgba(251,191,36,0.4)" : "rgba(74,222,128,0.15)") }}>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>⏱️ Rustend team — tijd tot wissel</div>
          {rustInfo.volgendWP ? (
            <div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 12 }}>
                <div style={{ fontSize: 44, fontWeight: 700, fontVariantNumeric: "tabular-nums", color: rustInfo.restMs && rustInfo.restMs < 1800000 ? "#fbbf24" : "#4ade80", letterSpacing: "-2px", lineHeight: 1 }}>
                  {formatAfteller(rustInfo.restMs)}
                </div>
                <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)" }}>resterend</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 10 }}>
                <div style={{ background: "rgba(0,0,0,0.25)", borderRadius: 10, padding: "8px", textAlign: "center" }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "white" }}>Team {rustInfo.lopendTeam === "A" ? "B" : "A"}</div>
                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>rust nu</div>

                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>team {rustInfo.lopendTeam}</div>
                </div>
                <div style={{ background: "rgba(0,0,0,0.25)", borderRadius: 10, padding: "8px", textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "white" }}>{formatEta(rustInfo.etaMs) || "—"}</div>
                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>ETA wissel</div>
                </div>
              </div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", textAlign: "center" }}>
                📍 {rustInfo.volgendWP.naam} · {rustInfo.volgendWP.km} km
              </div>
              {rustInfo.restMs && rustInfo.restMs < 1800000 && (
                <div style={{ marginTop: 8, padding: "8px 12px", background: "rgba(251,191,36,0.15)", borderRadius: 8, fontSize: 12, color: "#fbbf24", textAlign: "center", fontWeight: 600 }}>
                  ⚠️ Minder dan 30 min tot wissel — maak je klaar!
                </div>
              )}
            </div>
          ) : (
            <div style={{ textAlign: "center", color: "rgba(255,255,255,0.3)", fontSize: 13, padding: "8px 0" }}>
              Bevestig eerst een checkpoint om de afteller te starten
            </div>
          )}
        </div>

        <div style={{ textAlign: "center" }}>
          <button onClick={onSwitch} style={{ background: "none", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 99, padding: "8px 20px", fontSize: 13, color: "rgba(255,255,255,0.5)", cursor: "pointer" }}>👀 Supporter-tracker</button>
        </div>

      {toast && <div style={{ position: "fixed", bottom: 30, left: "50%", transform: "translateX(-50%)", background: "#16a34a", color: "white", padding: "12px 24px", borderRadius: 99, fontSize: 14, fontWeight: 600, zIndex: 100, whiteSpace: "nowrap" }}>{toast}</div>}
    </div>
  );
}

// ── SUPPORTERS BLOG ───────────────────────────────────────────────────────────
function SupportersBlog({ supporters, scriptUrl }) {
  const [naam, setNaam] = useState("");
  const [bericht, setBericht] = useState("");
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState("");
  const [fout, setFout] = useState("");

  function showToast(msg) { setToast(msg); setTimeout(function() { setToast(""); }, 3000); }

  function verstuur() {
    if (!naam.trim()) { setFout("Vul je naam in"); return; }
    if (!bericht.trim()) { setFout("Typ een bericht"); return; }
    if (bericht.length > 280) { setFout("Bericht max 280 tekens"); return; }
    setFout("");
    setLoading(true);
    const supUrl = scriptUrl + "?type=supporter&naam=" + encodeURIComponent(naam.trim()) + "&bericht=" + encodeURIComponent(bericht.trim()) + "&timestamp=" + encodeURIComponent(new Date().toISOString());
    fetch(supUrl)
      .then(function(r) { return r.json(); })
      .then(function() { showToast("✓ Bericht geplaatst!"); setBericht(""); setLoading(false); })
      .catch(function() { setFout("Versturen mislukt — probeer opnieuw"); setLoading(false); });
  }

  return (
    <div style={{ padding: "14px 16px 0" }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>💙 Supporters</div>
      <div style={{ background: "#1a2530", borderRadius: 14, padding: "14px", marginBottom: 10 }}>
        <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", marginBottom: 10 }}>Laat een bericht achter voor het team!</div>
        <input value={naam} onChange={function(e) { setNaam(e.target.value); setFout(""); }} placeholder="Jouw naam *" maxLength={50} style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: fout && !naam.trim() ? "1px solid #f87171" : "1px solid rgba(255,255,255,0.1)", background: "#0f1923", color: "white", fontSize: 14, outline: "none", fontFamily: "inherit", marginBottom: 8 }} />
        <div style={{ position: "relative" }}>
          <textarea value={bericht} onChange={function(e) { setBericht(e.target.value); setFout(""); }} placeholder="Typ je bericht... 💪🏃‍♂️🎉" maxLength={280} rows={3} style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: fout && !bericht.trim() ? "1px solid #f87171" : "1px solid rgba(255,255,255,0.1)", background: "#0f1923", color: "white", fontSize: 14, outline: "none", fontFamily: "inherit", resize: "none" }} />
          <span style={{ position: "absolute", bottom: 8, right: 10, fontSize: 10, color: bericht.length > 250 ? "#f87171" : "rgba(255,255,255,0.25)" }}>{bericht.length}/280</span>
        </div>
        {fout && <div style={{ fontSize: 12, color: "#f87171", marginTop: 6 }}>{fout}</div>}
        <button onClick={verstuur} disabled={loading} style={{ width: "100%", marginTop: 10, padding: "12px", fontSize: 15, fontWeight: 700, borderRadius: 12, border: "none", background: loading ? "#1e3a2e" : "linear-gradient(135deg,#1d4ed8,#3b82f6)", color: "white", cursor: loading ? "default" : "pointer", fontFamily: "inherit" }}>
          {loading ? "Versturen…" : "💙 Stuur bericht"}
        </button>

      {supporters.length === 0 ? (
        <div style={{ background: "#1a2530", borderRadius: 14, padding: "16px", fontSize: 13, color: "rgba(255,255,255,0.3)", textAlign: "center" }}>Nog geen supporter berichten — wees de eerste!</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {supporters.map(function(s, i) {
            const d = new Date(s.timestamp);
            const tijd = pad(d.getHours()) + ":" + pad(d.getMinutes());
            const dag = ["zo","ma","di","wo","do","vr","za"][d.getDay()];

              <div key={i} style={{ background: "rgba(59,130,246,0.07)", border: "1px solid rgba(59,130,246,0.2)", borderRadius: 12, padding: "12px 14px" }}>

    </div>
  );
}

// ── SUPPORTER TRACKER ─────────────────────────────────────────────────────────
function SupporterTracker({ onSwitch }) {
  const [checkpoints, setCheckpoints] = useState([]);
  const [gpsData, setGpsData] = useState(null);
  const [supporters, setSupporters] = useState([]);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [filter, setFilter] = useState("belangrijk");
  const [zoek, setZoek] = useState("");

  useEffect(function() {
    fetchData();
    const t = setInterval(fetchData, 30000);
    return function() { clearInterval(t); };
  }, []);

  function fetchData() {
    fetch(SCRIPT_URL + "?type=checkpoints")
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.checkpoints && data.checkpoints.length > 1) {
          setCheckpoints(data.checkpoints.slice(1).map(function(r) {
            return { timestamp: r[0], naam: r[2], km: parseFloat(r[3]) || 0 };
          }));
        } else {
          setCheckpoints([]);
        }
        if (data.gps && data.gps.lat) setGpsData(data.gps); else setGpsData(null);
        if (data.supporters) setSupporters(data.supporters);
        setLastUpdate(new Date());
      }).catch(function() {});
  }

  const huidigKm = checkpoints.length > 0 ? Math.max.apply(null, checkpoints.map(function(c) { return c.km; })) : 0;
  const pct = Math.min(100, Math.round((huidigKm / TOTAL_KM) * 100));

  // GPS status
  const gpsStatus = (function() {
    if (!gpsData || !gpsData.lat) return "geen";
    const oud = (Date.now() - new Date(gpsData.timestamp).getTime()) / 60000;
    if (oud < 10) return "live";
    if (oud < 30) return "vertraagd";
    return "oud";
  })();

  const gpsKm = (gpsData && gpsData.km) ? parseFloat(gpsData.km) : 0;
  const gebruiktGPS = gpsStatus === "live" || gpsStatus === "vertraagd";
  const effectiefKm = gebruiktGPS ? Math.max(gpsKm, huidigKm) : huidigKm;

  // Snelheid berekening - realtime huidige shift
  const gesorteerdeCP = checkpoints.slice().sort(function(a,b) { return a.km - b.km; });

  // Bepaal lopend team
  const laatsteCP = gesorteerdeCP.length > 0 ? gesorteerdeCP[gesorteerdeCP.length-1] : null;
  const huidigWP = laatsteCP ? WISSELPUNTEN.reduce(function(best, wp) {
    return Math.abs(wp.km - laatsteCP.km) < Math.abs(best.km - laatsteCP.km) ? wp : best;
  }, WISSELPUNTEN[0]) : WISSELPUNTEN[0];
  const lopendTeam = (huidigWP && huidigWP.team && huidigWP.team.includes("A→B")) ? "B" : "A";

  // Realtime snelheid huidige shift
  let snelheidNu = DEFAULT_SPEED;
  if (gesorteerdeCP.length > 0) {
    const shiftStart = gesorteerdeCP[gesorteerdeCP.length-1];
    const dKm = effectiefKm - shiftStart.km;
    const dtMs = Date.now() - new Date(shiftStart.timestamp).getTime();
    if (dKm > 0.3 && dtMs > 60000) snelheidNu = dKm / (dtMs / 3600000);
  }

  // Gemiddelde snelheid per team voor finish ETA
  let snelheidFinish = DEFAULT_SPEED;
  if (gesorteerdeCP.length >= 2) {
    let totaal = 0, aantal = 0;
    for (let i = 1; i < gesorteerdeCP.length; i++) {
      const dtMs = new Date(gesorteerdeCP[i].timestamp) - new Date(gesorteerdeCP[i-1].timestamp);
      const dKm = gesorteerdeCP[i].km - gesorteerdeCP[i-1].km;
      if (dtMs > 0 && dKm > 0.5) { totaal += dKm / (dtMs / 3600000); aantal++; }
    }
    if (aantal > 0) snelheidFinish = totaal / aantal;
  }

  const huidigPunt = ROUTE.filter(function(p) { return p.km <= effectiefKm; }).slice(-1)[0] || ROUTE[0];
  const volgendWP = WISSELPUNTEN.find(function(p) { return p.km > effectiefKm; });
  const looptijdMs = effectiefKm > 0 ? Date.now() - STARTMS : 0;

  const toonTypes = {
    belangrijk: ["start","wp","finish","cp"],
    steden: ["start","wp","finish","door"],
    rbr: ["start","wp","finish","rbr"],
    doorkomsten: ["start","wp","finish","door"],
    alles: ["start","wp","finish","cp","rbr","door","toilet"],
  };

  const zichtbaar = ROUTE.filter(function(p) {
    if (filter === "doorkomsten") {
      if (!["start","wp","finish","door"].includes(p.type)) return false;
      if (p.type === "door" && !p.naam.toLowerCase().startsWith("doorkomst")) return false;
    } else {
      if (!toonTypes[filter] || !toonTypes[filter].includes(p.type)) return false;
    }
    if (zoek && !p.naam.toLowerCase().includes(zoek.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{ fontFamily: "-apple-system,sans-serif", background: "#0f1923", minHeight: "100vh", color: "white", maxWidth: 430, margin: "0 auto", paddingBottom: 40 }}>

      {/* Header */}
      <div style={{ background: "linear-gradient(135deg,#0a1f2e,#0f2a1a)", padding: "44px 20px 16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
          <div>
            <div style={{ fontSize: 11, color: "#4ade80", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>HW-Runners · Live</div>
            <div style={{ fontSize: 22, fontWeight: 700 }}>Roparun 2026 🏃</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)" }}>{lastUpdate ? pad(lastUpdate.getHours()) + ":" + pad(lastUpdate.getMinutes()) : "—"}</div>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#4ade80", marginTop: 4, marginLeft: "auto", animation: "pulse 2s infinite" }} />
          </div>
        </div>

        {/* Progress */}
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "rgba(255,255,255,0.4)", marginBottom: 5 }}>
          <span>Clastres</span><span style={{ color: "#4ade80", fontWeight: 600 }}>{pct}% · {effectiefKm} km</span><span>Rotterdam</span>
        </div>
        <div style={{ height: 6, background: "rgba(255,255,255,0.1)", borderRadius: 3, overflow: "hidden" }}>
          <div style={{ height: "100%", width: pct + "%", background: "linear-gradient(90deg,#16a34a,#4ade80)", borderRadius: 3, transition: "width 0.8s" }} />
        </div>

        {/* GPS Status */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, padding: "8px 12px", background: gpsStatus === "live" ? "rgba(74,222,128,0.15)" : gpsStatus === "vertraagd" ? "rgba(251,191,36,0.15)" : huidigKm > 0 ? "rgba(59,130,246,0.15)" : "rgba(255,255,255,0.05)", borderRadius: 10, border: "1px solid " + (gpsStatus === "live" ? "rgba(74,222,128,0.4)" : gpsStatus === "vertraagd" ? "rgba(251,191,36,0.4)" : huidigKm > 0 ? "rgba(59,130,246,0.4)" : "rgba(255,255,255,0.1)") }}>
          <div style={{ width: 10, height: 10, borderRadius: "50%", flexShrink: 0, background: gpsStatus === "live" ? "#4ade80" : gpsStatus === "vertraagd" ? "#fbbf24" : huidigKm > 0 ? "#3b82f6" : "#6b7280", animation: gpsStatus === "live" ? "pulse 2s infinite" : "none" }} />
          <span style={{ fontSize: 12, fontWeight: 600, flex: 1, color: gpsStatus === "live" ? "#4ade80" : gpsStatus === "vertraagd" ? "#fbbf24" : huidigKm > 0 ? "#3b82f6" : "rgba(255,255,255,0.4)" }}>
            {gpsStatus === "live" ? "🛰️ GPS Live — Traccar actief" : gpsStatus === "vertraagd" ? "⚠️ GPS Vertraagd" : huidigKm > 0 ? "📍 Checkpoint — geen GPS" : "⚪ Wachten op data…"}
          </span>
          <span style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", flexShrink: 0 }}>{effectiefKm} km</span>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, padding: "12px 16px 0" }}>
        {[
          { val: effectiefKm, sub: "/" + TOTAL_KM + "km", lbl: "Afstand" },
          { val: snelheidNu.toFixed(1), sub: "km/h · " + lopendTeam, lbl: "Snelheid" },
          { val: formatDuur(looptijdMs), sub: "", lbl: "Onderweg" },
          { val: checkpoints.length > 0 ? (formatEta(calcEtaMs(effectiefKm, TOTAL_KM, snelheidFinish)) || "—") : "ma ~14:24", sub: "finish", lbl: "ETA" },
        ].map(function(s, i) {
          return (
            <div key={i} style={{ background: "#1a2530", borderRadius: 12, padding: "10px 8px", textAlign: "center" }}>
              <div style={{ fontSize: i === 2 ? 12 : 15, fontWeight: 700, lineHeight: 1.2 }}>{s.val}</div>
              <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>{s.sub}</div>
              <div style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", textTransform: "uppercase", letterSpacing: "0.05em" }}>{s.lbl}</div>
            </div>
          );
        })}
      </div>

      {/* Nu / Volgend */}
      <div style={{ padding: "10px 16px 0", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        <div style={{ background: "rgba(74,222,128,0.08)", border: "1px solid rgba(74,222,128,0.2)", borderRadius: 12, padding: "12px 14px" }}>
          <div style={{ fontSize: 10, color: "#4ade80", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>Nu bij</div>
          <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.3 }}>{huidigPunt.naam}</div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>{huidigPunt.km} km</div>
        </div>
        {volgendWP && (
          <div style={{ background: "#1a2530", borderRadius: 12, padding: "12px 14px" }}>
            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>Volgend WP</div>
            <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.3 }}>{volgendWP.naam.split("–").pop().trim()}</div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>{checkpoints.length > 0 ? (formatEta(calcEtaMs(effectiefKm, volgendWP.km, snelheidNu)) || volgendWP.tijd) : volgendWP.tijd}</div>
          </div>
        )}
      </div>

      {/* Kaart */}
      <RouteKaart huidigKm={effectiefKm} snelheid={snelheidNu} gpsData={gebruiktGPS ? gpsData : null} />

      {/* Filter + zoek */}
      <div style={{ padding: "14px 16px 0" }}>
        <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
          {[["belangrijk","WP + CP"],["steden","Steden"],["rbr","RBR"],["doorkomsten","Doorkomsten"],["alles","Alles"]].map(function(item) {
            return (
              <button key={item[0]} onClick={function() { setFilter(item[0]); }} style={{ padding: "5px 12px", borderRadius: 99, border: "none", fontSize: 12, fontWeight: 500, cursor: "pointer", background: filter === item[0] ? "#4ade80" : "#1a2530", color: filter === item[0] ? "#0a2e14" : "rgba(255,255,255,0.6)" }}>{item[1]}</button>
            );
          })}
        </div>
        <input value={zoek} onChange={function(e) { setZoek(e.target.value); }} placeholder="Zoek plaats…" style={{ width: "100%", padding: "9px 14px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "#1a2530", color: "white", fontSize: 14, outline: "none", fontFamily: "inherit", marginBottom: 10 }} />
      </div>

      {/* Route lijst */}
      <div style={{ padding: "0 16px" }}>
        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>Route · {zichtbaar.length} punten</div>
        <div style={{ background: "#1a2530", borderRadius: 14, overflow: "hidden" }}>
          {zichtbaar.map(function(p, i) {
            const s = STIJL[p.type] || STIJL.door;
            const isWP = ["start","wp","finish"].includes(p.type);
            const gepasseerd = checkpoints.length > 0 && p.km <= effectiefKm;
            const isNu = p.km === huidigPunt.km;
            const werkelijk = checkpoints.find(function(c) { return c.naam === p.naam; });
            const eta = checkpoints.length > 0 && !gepasseerd ? formatEta(calcEtaMs(effectiefKm, p.km, snelheidNu)) : null;
            return (
              <div key={i} style={{ padding: isWP ? "13px 16px" : "8px 16px", borderBottom: i < zichtbaar.length-1 ? "1px solid rgba(255,255,255," + (isWP ? "0.08" : "0.04") + ")" : "none", display: "flex", alignItems: "center", gap: 10, background: isNu ? "rgba(74,222,128,0.06)" : isWP ? "rgba(255,255,255,0.01)" : "transparent" }}>
                <div style={{ width: isWP ? 28 : 18, height: isWP ? 28 : 18, borderRadius: "50%", flexShrink: 0, background: gepasseerd ? (isWP ? "#16a34a" : "rgba(74,222,128,0.15)") : "#1e3a2e", border: isNu ? "2px solid " + s.kleur : "none", display: "flex", alignItems: "center", justifyContent: "center", fontSize: isWP ? 12 : 9 }}>
                  {gepasseerd && isWP ? "✓" : s.icon}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: isWP ? 14 : 12, fontWeight: isWP ? 600 : 400, color: gepasseerd ? (isWP ? "#4ade80" : "rgba(74,222,128,0.6)") : isWP ? "white" : "rgba(255,255,255,0.5)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.naam}</div>
                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.2)", marginTop: 1 }}>{p.km} km{p.team ? " · " + p.team : ""}</div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0, minWidth: 56 }}>
                  {werkelijk ? (
                    <div style={{ fontSize: 12, fontWeight: 600, color: "#4ade80" }}>{new Date(werkelijk.timestamp).toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"})}</div>
                  ) : eta ? (
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", fontStyle: "italic" }}>{"~" + eta}</div>
                  ) : p.tijd ? (
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.2)" }}>{p.tijd}</div>
                  ) : null}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Legenda */}
      <div style={{ padding: "12px 16px 0" }}>
        <div style={{ background: "#1a2530", borderRadius: 12, padding: "10px 14px", display: "flex", flexWrap: "wrap", gap: "5px 12px" }}>
          {Object.entries(STIJL).map(function(entry) {
            return (
              <div key={entry[0]} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "rgba(255,255,255,0.4)" }}>
                <span>{entry[1].icon}</span><span>{entry[1].label}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Website + Donatie */}
      <div style={{ padding: "20px 16px 0" }}>
        <a href="https://www.hwrunners.nl" target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none", display: "block", marginBottom: 10 }}>
          <div style={{ background: "#1a2530", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 14, padding: "14px 18px", display: "flex", alignItems: "center", gap: 14 }}>
            <img src={HW_LOGO} alt="HW Runners" style={{ width: 56, height: 56, objectFit: "contain", background: "white", borderRadius: 10, padding: 4, flexShrink: 0 }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: "white", marginBottom: 2 }}>HW-Runners</div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)", lineHeight: 1.4 }}>Bezoek onze website voor meer updates en teaminfo</div>
            </div>
            <span style={{ fontSize: 18, color: "rgba(255,255,255,0.3)" }}>→</span>
          </div>
        </a>
        <a href="https://www.roparun.nl/teams/hwrunners/donate" target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none", display: "block" }}>
          <div style={{ background: "linear-gradient(135deg,#dc2626,#ef4444)", borderRadius: 16, padding: "20px", textAlign: "center", boxShadow: "0 8px 30px rgba(220,38,38,0.35)", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -20, right: -20, fontSize: 80, opacity: 0.08 }}>❤️</div>
            <div style={{ fontSize: 26, marginBottom: 6 }}>❤️</div>
            <div style={{ fontSize: 18, fontWeight: 700, color: "white", marginBottom: 4 }}>Steun ons team!</div>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.85)", marginBottom: 14, lineHeight: 1.4 }}>Samen in actie voor palliatieve zorg bij kanker</div>
            <div style={{ background: "white", color: "#dc2626", fontWeight: 700, fontSize: 15, padding: "10px 28px", borderRadius: 99, display: "inline-block" }}>💛 Doneer nu</div>
          </div>
        </a>
      </div>

      {/* Supporters blog */}
      <SupportersBlog supporters={supporters} scriptUrl={SCRIPT_URL} />

      <div style={{ textAlign: "center", marginTop: 20, paddingBottom: 8 }}>
        <button onClick={onSwitch} style={{ background: "none", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 99, padding: "8px 20px", fontSize: 13, color: "rgba(255,255,255,0.5)", cursor: "pointer" }}>Team app</button>
      </div>

      <style>{"@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}"}</style>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("supporter");
  return view === "team"
    ? <TeamApp onSwitch={function() { setView("supporter"); }} />
    : <SupporterTracker onSwitch={function() { setView("team"); }} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
