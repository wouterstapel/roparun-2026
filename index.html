function pad(n) { return String(n).padStart(2, "0"); }
function formatDuur(ms) {
  if (ms <= 0) return "—";
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  return `${h}u ${pad(m)}m`;
}
function calcEtaMs(vanKm, naarKm, snelheid) {
  if (!snelheid || snelheid <= 0 || naarKm <= vanKm) return null;
  return Date.now() + ((naarKm - vanKm) / snelheid) * 3600000;
}
function formatEta(ms) {
  if (!ms) return null;
  const d = new Date(ms);
  return `${["zo","ma","di","wo","do","vr","za"][d.getDay()]} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ── PIN SCHERM ────────────────────────────────────────────────────────────────
function PinScherm({ onSuccess }) {
  const [pin, setPin] = useState("");
  const [fout, setFout] = useState(false);

  function drukKnop(k) {
    if (k === "⌫") { setPin(p => p.slice(0,-1)); setFout(false); return; }
    const nieuw = pin + k;
    setPin(nieuw);
    if (nieuw.length === 4) {
      if (nieuw === TEAM_PIN) { onSuccess(); }
      else { setFout(true); setTimeout(() => { setPin(""); setFout(false); }, 600); }
    }
  }

  return (
    <div style={{ fontFamily: "-apple-system,BlinkMacSystemFont,sans-serif", background: "#0f1923", minHeight: "100vh", color: "white", maxWidth: 430, margin: "0 auto", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32 }}>
      <div style={{ fontSize: 32, marginBottom: 8 }}>🔒</div>
      <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Team App</div>
      <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", marginBottom: 40 }}>Voer de pincode in</div>

      {/* Dots */}
      <div style={{ display: "flex", gap: 16, marginBottom: 40 }}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{ width: 18, height: 18, borderRadius: "50%", background: fout ? "#ef4444" : pin.length > i ? "#4ade80" : "rgba(255,255,255,0.15)", transition: "background 0.15s", transform: fout ? "scale(1.2)" : "scale(1)" }} />
        ))}
      </div>

      {/* Numpad */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, width: "100%", maxWidth: 280 }}>
        {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k, i) => (
          k === "" ? <div key={i} /> :
          <button key={i} onClick={() => drukKnop(k)} style={{ padding: "18px 0", fontSize: k === "⌫" ? 20 : 22, fontWeight: 600, borderRadius: 14, border: "none", background: k === "⌫" ? "#1a2530" : "#1e3a2e", color: "white", cursor: "pointer", fontFamily: "inherit", transition: "transform 0.1s", active: "transform: scale(0.95)" }}>
            {k}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── TEAM APP ──────────────────────────────────────────────────────────────────
function TeamApp({ onSwitch }) {
  const [ingelogd, setIngelogd] = useState(false);
  const [sel, setSel] = useState(null);
  const [log, setLog] = useState([]);
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState("");
  const [filter, setFilter] = useState("wp");
  const [zoek, setZoek] = useState("");

  if (!ingelogd) return <PinScherm onSuccess={() => setIngelogd(true)} />;

  function nowStr() { return new Date().toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit", second: "2-digit" }); }
  function addLog(msg, t) { setLog(p => [{ msg, t, time: nowStr() }, ...p].slice(0, 10)); }
  function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 3000); }

  function bevestig() {
    if (!sel) { showToast("Kies eerst een punt"); return; }
    setLoading(true);
    const url = SCRIPT_URL + '?type=checkpoint&team=HW-Runners&checkpoint=' + encodeURIComponent(sel.naam) + '&km=' + sel.km + '&timestamp=' + encodeURIComponent(new Date().toISOString());
    fetch(url)
      .then(r => r.json())
      .then(data => { if (data.ok) { addLog(`✓ ${sel.naam} (${sel.km} km)`, "ok"); showToast(`✓ ${sel.naam} gelogd!`); setLoading(false); setSel(null); } else { throw new Error(); } })
      .catch(() => { addLog("Versturen mislukt — check verbinding", "err"); setLoading(false); });
  }

  const toonTypes = {
    wp:    ["start","wp","finish"],
    cp:    ["start","wp","finish","cp"],
    rbr:   ["start","wp","finish","rbr"],
    alles: ["start","wp","finish","cp","rbr","door","toilet"],
  };

  const zichtbaar = ROUTE.filter(p => {
    if (!toonTypes[filter]?.includes(p.type)) return false;
    if (zoek && !p.naam.toLowerCase().includes(zoek.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{ fontFamily: "-apple-system,BlinkMacSystemFont,sans-serif", background: "#0f1923", minHeight: "100vh", color: "white", maxWidth: 430, margin: "0 auto", paddingBottom: 40 }}>
      <div style={{ background: "linear-gradient(135deg,#1a3a2a,#0f2a1a)", padding: "44px 20px 16px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 11, color: "#4ade80", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>HW-Runners · Roparun 2026</div>
            <div style={{ fontSize: 22, fontWeight: 700 }}>Team App 📱</div>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", marginTop: 2 }}>Geef door bij welk punt je bent</div>
          </div>
          <button onClick={() => setIngelogd(false)} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 99, padding: "6px 12px", color: "rgba(255,255,255,0.4)", fontSize: 12, cursor: "pointer" }}>🔒 Slot</button>
        </div>
      </div>

      <div style={{ padding: "14px 16px 0" }}>
        {/* Filter tabs */}
        <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
          {[["wp","Wisselpunten"],["cp","+ Checkpoints"],["rbr","+ RBR"],["alles","Alles"]].map(([k,l]) => (
            <button key={k} onClick={() => setFilter(k)} style={{ padding: "5px 12px", borderRadius: 99, border: "none", fontSize: 12, fontWeight: 500, cursor: "pointer", background: filter === k ? "#4ade80" : "#1a2530", color: filter === k ? "#0a2e14" : "rgba(255,255,255,0.6)" }}>{l}</button>
          ))}
        </div>

        {/* Zoek */}
        <input value={zoek} onChange={e => setZoek(e.target.value)} placeholder="Zoek plaats of punt…" style={{ width: "100%", padding: "9px 14px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "#1a2530", color: "white", fontSize: 14, outline: "none", fontFamily: "inherit", marginBottom: 10 }} />

        {/* Lijst */}
        <div style={{ background: "#1a2530", borderRadius: 14, overflow: "hidden", marginBottom: 14, maxHeight: 420, overflowY: "auto" }}>
          {zichtbaar.map((p, i) => {
            const s = STIJL[p.type];
            const selected = sel?.km === p.km && sel?.naam === p.naam;
            const isWP = ["start","wp","finish"].includes(p.type);
            return (
              <div key={i} onClick={() => setSel(selected ? null : p)} style={{ padding: isWP ? "13px 16px" : "9px 16px", borderBottom: i < zichtbaar.length-1 ? "1px solid rgba(255,255,255,0.05)" : "none", display: "flex", alignItems: "center", gap: 12, background: selected ? "rgba(74,222,128,0.12)" : "transparent", cursor: "pointer" }}>
                <div style={{ width: isWP ? 32 : 24, height: isWP ? 32 : 24, borderRadius: "50%", background: selected ? s.kleur : isWP ? "#1e3a2e" : "rgba(255,255,255,0.05)", border: selected ? `2px solid ${s.kleur}` : isWP ? "1px solid rgba(255,255,255,0.15)" : "none", display: "flex", alignItems: "center", justifyContent: "center", fontSize: isWP ? 14 : 11, flexShrink: 0 }}>{s.icon}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: isWP ? 14 : 12, fontWeight: isWP ? 600 : 400, color: selected ? "#4ade80" : isWP ? "white" : "rgba(255,255,255,0.55)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.naam}</div>
                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.25)", marginTop: 1 }}>{p.km} km{p.tijd ? ` · ${p.tijd}` : ""}{p.team ? ` · ${p.team}` : ""}</div>
                </div>
                {selected && <div style={{ color: "#4ade80", fontSize: 18, flexShrink: 0 }}>✓</div>}
              </div>
            );
          })}
        </div>

        {/* Bevestig knop */}
        <button onClick={bevestig} disabled={loading || !sel} style={{ width: "100%", padding: 16, fontSize: 16, fontWeight: 700, borderRadius: 14, border: "none", background: !sel ? "#1a2530" : loading ? "#1a3a2a" : "linear-gradient(135deg,#16a34a,#4ade80)", color: !sel ? "rgba(255,255,255,0.3)" : "#000", cursor: !sel ? "default" : "pointer", marginBottom: 14, transition: "all 0.2s" }}>
          {loading ? "Versturen…" : sel ? `✓ Bevestig: ${sel.naam}` : "Selecteer een punt hierboven"}
        </button>

        {/* Log */}
        {log.length > 0 && (
          <div style={{ background: "#1a2530", borderRadius: 14, overflow: "hidden", marginBottom: 14 }}>
            <div style={{ padding: "8px 16px 4px", fontSize: 10, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: "0.1em" }}>Log</div>
            {log.map((l, i) => (
              <div key={i} style={{ padding: "8px 16px", borderTop: "1px solid rgba(255,255,255,0.05)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 12, color: l.t === "ok" ? "#4ade80" : "#f87171" }}>{l.msg}</span>
                <span style={{ fontSize: 11, color: "rgba(255,255,255,0.25)", flexShrink: 0, marginLeft: 8 }}>{l.time}</span>
              </div>
            ))}
          </div>
        )}

        <div style={{ textAlign: "center" }}>
          <button onClick={onSwitch} style={{ background: "none", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 99, padding: "8px 20px", fontSize: 13, color: "rgba(255,255,255,0.5)", cursor: "pointer" }}>👀 Supporter-tracker</button>
        </div>
      </div>

      {toast && <div style={{ position: "fixed", bottom: 30, left: "50%", transform: "translateX(-50%)", background: "#16a34a", color: "white", padding: "12px 24px", borderRadius: 99, fontSize: 14, fontWeight: 600, zIndex: 100, whiteSpace: "nowrap", boxShadow: "0 8px 30px rgba(0,0,0,0.4)" }}>{toast}</div>}
    </div>
  );
}

// ── SUPPORTER TRACKER ─────────────────────────────────────────────────────────
function SupporterTracker({ onSwitch }) {
  const [checkpoints, setCheckpoints] = useState([]);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [filter, setFilter] = useState("belangrijk");
  const [zoek, setZoek] = useState("");

  useEffect(() => { fetchData(); const t = setInterval(fetchData, 30000); return () => clearInterval(t); }, []);

  function fetchData() {
    fetch(SCRIPT_URL + "?type=checkpoints")
      .then(r => r.json())
      .then(data => {
        if (data.checkpoints?.length > 1) {
          setCheckpoints(data.checkpoints.slice(1).map(r => ({ timestamp: r[0], naam: r[2], km: parseFloat(r[3]) || 0 })));
        } else {
          setCheckpoints([]);
        }
        setLastUpdate(new Date());
      }).catch(() => {});
  }

  const huidigKm = checkpoints.length > 0 ? Math.max(...checkpoints.map(c => c.km)) : 0;
  const pct = Math.min(100, Math.round((huidigKm / TOTAL_KM) * 100));

  let snelheid = DEFAULT_SPEED;
  if (checkpoints.length >= 2) {
    const sorted = [...checkpoints].sort((a,b) => a.km - b.km);
    const dtMs = new Date(sorted.at(-1).timestamp) - new Date(sorted[0].timestamp);
    const dKm = sorted.at(-1).km - sorted[0].km;
    if (dtMs > 0 && dKm > 0) snelheid = dKm / (dtMs / 3600000);
  }

  const huidigPunt = ROUTE.filter(p => p.km <= huidigKm).at(-1) || ROUTE[0];
  const volgendWP = ROUTE.filter(p => ["wp","finish"].includes(p.type) && p.km > huidigKm)[0];
  const looptijdMs = huidigKm > 0 ? Date.now() - STARTMS : 0;

  const toonTypes = {
    belangrijk: ["start","wp","finish","cp"],
    steden: ["start","wp","finish","door"],
    rbr: ["start","wp","finish","rbr"],
    alles: ["start","wp","finish","cp","rbr","door","toilet"],
  };

  const zichtbaar = ROUTE.filter(p => {
    if (!toonTypes[filter]?.includes(p.type)) return false;
    if (zoek && !p.naam.toLowerCase().includes(zoek.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{ fontFamily: "-apple-system,BlinkMacSystemFont,sans-serif", background: "#0f1923", minHeight: "100vh", color: "white", maxWidth: 430, margin: "0 auto", paddingBottom: 40 }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg,#0a1f2e,#0f2a1a)", padding: "44px 20px 16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
          <div>
            <div style={{ fontSize: 11, color: "#4ade80", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>HW-Runners · Live</div>
            <div style={{ fontSize: 22, fontWeight: 700 }}>Roparun 2026 🏃</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)" }}>{lastUpdate ? `${pad(lastUpdate.getHours())}:${pad(lastUpdate.getMinutes())}` : "—"}</div>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#4ade80", marginTop: 4, marginLeft: "auto", animation: "pulse 2s infinite" }} />
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "rgba(255,255,255,0.4)", marginBottom: 5 }}>
          <span>Clastres</span><span style={{ color: "#4ade80", fontWeight: 600 }}>{pct}% · {huidigKm} km</span><span>Rotterdam</span>
        </div>
        <div style={{ height: 6, background: "rgba(255,255,255,0.1)", borderRadius: 3, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: "linear-gradient(90deg,#16a34a,#4ade80)", borderRadius: 3, transition: "width 0.8s" }} />
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, padding: "12px 16px 0" }}>
        {[
          { val: `${huidigKm}`, sub: `/${TOTAL_KM}km`, lbl: "Afstand" },
          { val: `${snelheid.toFixed(1)}`, sub: "km/h", lbl: "Snelheid" },
          { val: formatDuur(looptijdMs), sub: "", lbl: "Onderweg" },
          { val: checkpoints.length > 0 ? (formatEta(calcEtaMs(huidigKm, TOTAL_KM, snelheid)) || "—") : "ma ~14:24", sub: "finish", lbl: "ETA" },
        ].map((s, i) => (
          <div key={i} style={{ background: "#1a2530", borderRadius: 12, padding: "10px 8px", textAlign: "center" }}>
            <div style={{ fontSize: i === 2 ? 12 : 15, fontWeight: 700, lineHeight: 1.2 }}>{s.val}</div>
            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>{s.sub}</div>
            <div style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", textTransform: "uppercase", letterSpacing: "0.05em" }}>{s.lbl}</div>
          </div>
        ))}
      </div>

      {/* Nu / Volgend */}
      <div style={{ padding: "10px 16px 0", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        <div style={{ background: "rgba(74,222,128,0.08)", border: "1px solid rgba(74,222,128,0.2)", borderRadius: 12, padding: "12px 14px" }}>
          <div style={{ fontSize: 10, color: "#4ade80", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>📍 Nu bij</div>
          <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.3 }}>{huidigPunt.naam}</div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>{huidigPunt.km} km</div>
        </div>
        {volgendWP && (
          <div style={{ background: "#1a2530", borderRadius: 12, padding: "12px 14px" }}>
            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>🎯 Volgend WP</div>
            <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.3 }}>{volgendWP.naam.split("–").pop()?.trim()}</div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>{checkpoints.length > 0 ? (formatEta(calcEtaMs(huidigKm, volgendWP.km, snelheid)) || volgendWP.tijd) : volgendWP.tijd}</div>
          </div>
        )}
      </div>

      {/* Filter + zoek */}
      <div style={{ padding: "14px 16px 0" }}>
        <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
          {[["belangrijk","WP + CP"],["steden","Steden"],["rbr","RBR"],["alles","Alles"]].map(([k,l]) => (
            <button key={k} onClick={() => setFilter(k)} style={{ padding: "5px 12px", borderRadius: 99, border: "none", fontSize: 12, fontWeight: 500, cursor: "pointer", background: filter === k ? "#4ade80" : "#1a2530", color: filter === k ? "#0a2e14" : "rgba(255,255,255,0.6)" }}>{l}</button>
          ))}
        </div>
        <input value={zoek} onChange={e => setZoek(e.target.value)} placeholder="Zoek plaats…" style={{ width: "100%", padding: "9px 14px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "#1a2530", color: "white", fontSize: 14, outline: "none", fontFamily: "inherit", marginBottom: 10 }} />
      </div>

      {/* Route tijdlijn */}
      <div style={{ padding: "0 16px" }}>
        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>Route · {zichtbaar.length} punten</div>
        <div style={{ background: "#1a2530", borderRadius: 14, overflow: "hidden" }}>
          {zichtbaar.map((p, i) => {
            const s = STIJL[p.type];
            const isWP = ["start","wp","finish"].includes(p.type);
            const gepasseerd = checkpoints.length > 0 && p.km <= huidigKm;
            const isNu = p.km === huidigPunt.km;
            const werkelijk = checkpoints.find(c => c.naam === p.naam);
            const eta = checkpoints.length > 0 && !gepasseerd ? formatEta(calcEtaMs(huidigKm, p.km, snelheid)) : null;
            return (
              <div key={i} style={{ padding: isWP ? "13px 16px" : "8px 16px", borderBottom: i < zichtbaar.length-1 ? `1px solid rgba(255,255,255,${isWP?"0.08":"0.04"})` : "none", display: "flex", alignItems: "center", gap: 10, background: isNu ? "rgba(74,222,128,0.06)" : isWP ? "rgba(255,255,255,0.01)" : "transparent" }}>
                <div style={{ width: isWP ? 28 : 18, height: isWP ? 28 : 18, borderRadius: "50%", flexShrink: 0, background: gepasseerd ? (isWP ? "#16a34a" : "rgba(74,222,128,0.15)") : "#1e3a2e", border: isNu ? `2px solid ${s.kleur}` : "none", display: "flex", alignItems: "center", justifyContent: "center", fontSize: isWP ? 12 : 9 }}>
                  {gepasseerd && isWP ? "✓" : s.icon}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: isWP ? 14 : 12, fontWeight: isWP ? 600 : 400, color: gepasseerd ? (isWP ? "#4ade80" : "rgba(74,222,128,0.6)") : isWP ? "white" : "rgba(255,255,255,0.5)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.naam}</div>
                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.2)", marginTop: 1 }}>{p.km} km{p.team ? ` · ${p.team}` : ""}</div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0, minWidth: 56 }}>
                  {werkelijk ? (
                    <div style={{ fontSize: 12, fontWeight: 600, color: "#4ade80" }}>{new Date(werkelijk.timestamp).toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"})}</div>
                  ) : eta ? (
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", fontStyle: "italic" }}>~{eta}</div>
                  ) : p.tijd ? (
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.2)" }}>{p.tijd}</div>
                  ) : null}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Legenda */}
      <div style={{ padding: "12px 16px 0" }}>
        <div style={{ background: "#1a2530", borderRadius: 12, padding: "10px 14px", display: "flex", flexWrap: "wrap", gap: "5px 12px" }}>
          {Object.entries(STIJL).map(([k,v]) => (
            <div key={k} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "rgba(255,255,255,0.4)" }}>
              <span>{v.icon}</span><span>{v.label}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{ textAlign: "center", marginTop: 20 }}>
        <button onClick={onSwitch} style={{ background: "none", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 99, padding: "8px 20px", fontSize: 13, color: "rgba(255,255,255,0.5)", cursor: "pointer" }}>📱 Naar team-app</button>
      </div>

      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}`}</style>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("supporter");
  return view === "team"
    ? <TeamApp onSwitch={() => setView("supporter")} />
    : <SupporterTracker onSwitch={() => setView("team")} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
